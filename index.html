<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href = "index.css">

    <title>Score Card</title>
</head>
<body>
    <h1>SCORE</h1>
    <section class="sec">
        <div >
            <h2>Home</h2>
            <div class="div">
                <h3 id="homeScore">0</h3>
            </div>           
            <button class="btn" onclick="home1()">+1</button>
            <button class="btn" onclick="home2()">+2</button>
            <button class="btn" onclick="home3()">+3</button>
        </div>
        <div >
            <h2>Guest</h2>
            <div class="div">
                <h3 id="guestScore">0</h3>
            </div>
            <button class="btn" onclick="guest1()">+1</button>
            <button class="btn" onclick="guest2()">+2</button>
            <button class="btn" onclick="guest3()">+3</button>
        </div>   
        <script src="index.js"></script>
    </section>
    <section class="reset">
        <button id = "reset-btn" onclick="reset()">RESET</button>
    </section>


    
</body>
</html>
